name: App Store build (cloud)

# Build + sign + upload the macOS / iOS / tvOS App Store binaries on a GitHub-hosted macos runner
# (RELEASED macOS + RELEASED Xcode). This sidesteps the two local-build rejections you hit when your
# dev Mac runs a BETA macOS (see docs/CLOUD-SUBMISSION.md):
#   - ITMS-90301 — Apple rejects App Store builds made on a BETA macOS.
#   - ITMS-90111 — the Xcode/SDK floor; a GitHub runner always has a current GA Xcode.
# Free for a PUBLIC repo. Signing is MANUAL via .p12 secrets (cloud/automatic signing fails for some
# team ASC keys — see docs). Bump AppVersion.xcconfig + push BEFORE dispatching so the build number
# is monotonic.
#
# MOVING TARGET: the `runs-on:` label and the Xcode version selected below MUST track the current
# RELEASED macOS + Xcode. Apple raises the SDK floor every few weeks (ITMS-90111). When a build is
# rejected for "Unsupported SDK or Xcode version", bump both here (newer `macos-NN` runner image +
# newer `Xcode_NN.*` glob) and re-run.
#
# REQUIRED SECRETS (set once via tools/ci_make_signing_p12.py + gh secret set — see docs/CLOUD-SUBMISSION.md):
#   APPLE_DIST_P12 / APPLE_INSTALLER_P12 — base64 of the Distribution / 3rd-Party-Mac-Installer .p12
#   APPLE_P12_PASSWORD                   — the .p12 password
#   APPLE_DIST_CERT_ID                   — the Distribution cert id (ties the App Store profiles to it)
#   ASC_KEY_P8 / ASC_KEY_ID / ASC_ISSUER_ID — the App Store Connect API key (.p8 base64 + ids)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Which platform(s) to build + upload'
        required: true
        default: 'all'
        type: choice
        options: [all, mac, ios, tvos]

concurrency:
  group: appstore-build
  cancel-in-progress: false

jobs:
  build:
    # MOVING TARGET — keep this on the newest RELEASED macOS runner image (see header note).
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Select a released Xcode (clears the ITMS-90111 SDK floor)
        run: |
          # MOVING TARGET — prefer the newest released Xcode present on the runner. Update the
          # glob when Apple's floor moves (a build number ending in a lowercase letter is a BETA
          # and is still rejected for App Review — pick a GA/RC).
          XC="$(ls -d /Applications/Xcode_26.6*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$XC" ] || XC="$(ls -d /Applications/Xcode_26.*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$XC" ] || XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -iv beta | sort -V | tail -1)"
          echo "Selected Xcode: $XC"
          sudo xcode-select -s "$XC"
          echo "DEVELOPER_DIR=$XC/Contents/Developer" >> "$GITHUB_ENV"
          "$XC/Contents/Developer/usr/bin/xcodebuild" -version

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install --quiet PyJWT cryptography requests

      - name: Import signing certs into a temporary keychain
        env:
          P12PW: ${{ secrets.APPLE_P12_PASSWORD }}
          DIST_P12_B64: ${{ secrets.APPLE_DIST_P12 }}
          INST_P12_B64: ${{ secrets.APPLE_INSTALLER_P12 }}
        run: |
          KC="$RUNNER_TEMP/appname-signing.keychain-db"
          KCPW="$(openssl rand -hex 16)"; echo "::add-mask::$KCPW"
          security create-keychain -p "$KCPW" "$KC"
          security set-keychain-settings -lut 7200 "$KC"
          security unlock-keychain -p "$KCPW" "$KC"
          printf '%s' "$DIST_P12_B64" | base64 -d > "$RUNNER_TEMP/dist.p12"
          printf '%s' "$INST_P12_B64" | base64 -d > "$RUNNER_TEMP/inst.p12"
          # -A -T codesign/productbuild = "allow these tools to use the key without a prompt".
          security import "$RUNNER_TEMP/dist.p12" -k "$KC" -P "$P12PW" -A -T /usr/bin/codesign -T /usr/bin/productbuild
          security import "$RUNNER_TEMP/inst.p12" -k "$KC" -P "$P12PW" -A -T /usr/bin/codesign -T /usr/bin/productbuild
          # set-key-partition-list is REQUIRED on modern macOS or codesign hangs/fails asking for the key.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KCPW" "$KC" >/dev/null
          # Put the temp keychain first in the user search list (keep the existing ones) + make it default.
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/[" ]//g')
          security default-keychain -s "$KC"
          rm -f "$RUNNER_TEMP/dist.p12" "$RUNNER_TEMP/inst.p12"
          echo "--- signing identities on the runner ---"
          security find-identity -v -p codesigning "$KC"
          security find-identity -v "$KC" | grep -i installer || true

      - name: Install the ASC API key + credentials
        env:
          ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8 }}
          KID: ${{ secrets.ASC_KEY_ID }}
          ISS: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_P8_B64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${KID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KID}.p8
          printf 'ASC_KEY_ID=%s\nASC_ISSUER_ID=%s\n' "$KID" "$ISS" > tools/asc-credentials.env

      - name: Archive + sign + upload to App Store Connect
        env:
          ASC_DIST_CERT_ID: ${{ secrets.APPLE_DIST_CERT_ID }}
          # ASC_TEAM_ID + ASC_ORG_NAME are consumed by tools/submit-appstore.sh (see that file's
          # PER-APP CONFIG). Set them here from secrets/vars, or hardcode them in the script.
          ASC_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_ORG_NAME: ${{ secrets.APPLE_ORG_NAME }}
        run: |
          echo "Building ${{ github.event.inputs.platform }} | $(sw_vers -productVersion) ($(sw_vers -buildVersion)) | $(xcodebuild -version | tr '\n' ' ')"
          tools/submit-appstore.sh "${{ github.event.inputs.platform }}"

      - name: Build log tail on failure
        if: failure()
        run: echo "::warning::Build failed — check the 'Archive + sign + upload' step output above."
